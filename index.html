<!DOCTYPE html>
<html lang="az">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0, maximum-scale=1.0, user-scalable=no">
    <title>VaceGPT - Pro</title>
    <script src="https://www.gstatic.com/firebasejs/9.0.0/firebase-app-compat.js"></script>
    <script src="https://www.gstatic.com/firebasejs/9.0.0/firebase-auth-compat.js"></script>
    <style>
        :root { --sidebar-bg: #f9f9f9; --border: #e5e5e5; --vace-color: #10a37f; --user-blue: #5436da; }
        * { margin: 0; padding: 0; box-sizing: border-box; font-family: 'Inter', sans-serif; -webkit-tap-highlight-color: transparent; }
        body { display: flex; height: 100vh; background: white; color: #1f1f1f; overflow: hidden; }

        .sidebar { 
            width: 260px; background: var(--sidebar-bg); border-right: 1px solid var(--border); 
            padding: 15px; display: flex; flex-direction: column; z-index: 1000;
            transition: transform 0.3s ease;
        }
        .menu-toggle { display: none; position: absolute; top: 15px; left: 15px; z-index: 1001; background: white; border: 1px solid var(--border); padding: 8px; border-radius: 8px; cursor: pointer; }
        .new-chat { background: white; border: 1px solid var(--border); padding: 12px; border-radius: 10px; cursor: pointer; font-weight: 600; margin-top: 40px; width: 100%; transition: 0.2s; }
        .new-chat:hover { background: #eee; }
        
        .history { flex: 1; overflow-y: auto; margin-top: 20px; }
        .history-item { padding: 12px; border-radius: 8px; cursor: pointer; font-size: 14px; margin-bottom: 5px; background: white; border: 1px solid var(--border); overflow: hidden; text-overflow: ellipsis; white-space: nowrap; }

        .user-section { border-top: 1px solid var(--border); padding-top: 15px; margin-top: 10px; }
        .login-btn { background: #4285F4; color: white; border: none; padding: 10px; border-radius: 8px; cursor: pointer; width: 100%; font-weight: bold; }
        .profile-info { display: flex; align-items: center; gap: 10px; font-size: 13px; }
        .profile-info img { width: 32px; height: 32px; border-radius: 50%; }

        .main { flex: 1; display: flex; flex-direction: column; position: relative; width: 100%; }
        #chat-window { flex: 1; overflow-y: auto; padding: 60px 15% 120px 15%; display: none; flex-direction: column; }
        #start-screen { flex: 1; display: flex; flex-direction: column; align-items: center; justify-content: center; text-align: center; padding: 20px; }

        .msg { display: flex; gap: 12px; margin-bottom: 30px; width: 100%; animation: fadeIn 0.2s ease; }
        @keyframes fadeIn { from { opacity: 0; } to { opacity: 1; } }
        .avatar { width: 32px; height: 32px; border-radius: 50%; flex-shrink: 0; display: flex; align-items: center; justify-content: center; color: white; font-weight: bold; font-size: 12px; }
        .u-av { background: var(--user-blue); } .b-av { background: var(--vace-color); }
        .txt { font-size: 15px; line-height: 1.6; flex: 1; word-break: break-word; }

        .upgrade-card { margin-top: 15px; padding: 15px; border-radius: 12px; color: white; background: linear-gradient(135deg, #10a37f, #0d8a6b); }
        .upgrade-btn { margin-top: 10px; background: white; color: #10a37f; border: none; padding: 8px 15px; border-radius: 20px; font-weight: bold; cursor: pointer; }

        .input-area { position: absolute; bottom: 0; width: 100%; padding: 20px; background: white; }
        .input-box { background: #f4f4f4; border: 1px solid var(--border); border-radius: 24px; display: flex; align-items: center; padding: 5px 15px; max-width: 750px; margin: 0 auto; }
        input { flex: 1; background: transparent; border: none; outline: none; font-size: 16px; padding: 12px 5px; }
        .send-btn { background: black; color: white; width: 35px; height: 35px; border-radius: 50%; border: none; cursor: pointer; font-size: 18px; }

        @media (max-width: 768px) {
            .sidebar { position: fixed; left: 0; top: 0; bottom: 0; transform: translateX(-100%); width: 280px; }
            .sidebar.active { transform: translateX(0); box-shadow: 10px 0 30px rgba(0,0,0,0.1); }
            .menu-toggle { display: block; }
            #chat-window { padding: 80px 15px 100px 15px; }
        }
        .overlay { display: none; position: fixed; top: 0; left: 0; right: 0; bottom: 0; background: rgba(0,0,0,0.4); z-index: 999; }
        .overlay.active { display: block; }
    </style>
</head>
<body>

    <button class="menu-toggle" id="menu-btn" onclick="toggleSidebar()">☰</button>
    <div class="overlay" id="overlay" onclick="toggleSidebar()"></div>

    <aside class="sidebar" id="sidebar">
        <button class="new-chat" onclick="newChat(); forceCloseSidebar();">+ Yeni Söhbət</button>
        <div class="history" id="history-list"></div>
        <div class="user-section" id="user-section">
            <button class="login-btn" onclick="loginWithGoogle()">Google ilə Giriş</button>
        </div>
    </aside>

    <main class="main">
        <div id="start-screen">
            <h1 id="welcome-msg" style="font-size: 32px;">Mən VaceGPT. Sizə necə kömək edə bilərəm?</h1>
            <p style="color: #888; margin-top: 10px;">Söhbətə başlamaq üçün aşağıda qeyd edin.</p>
        </div>
        <div id="chat-window"></div>
        <div class="input-area">
            <div class="input-box">
                <input type="text" id="user-in" placeholder="VaceGPT-yə yazın...">
                <button class="send-btn" onclick="handleSend()">↑</button>
            </div>
        </div>
    </main>

    <script>
        const GROQ_KEY = "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";
        const firebaseConfig = { apiKey: "X", authDomain: "X", projectId: "X", storageBucket: "X", messagingSenderId: "X", appId: "X" };

        firebase.initializeApp(firebaseConfig);
        const auth = firebase.auth();
        let currentUser = null;
        let currentChatId = null;

        function loginWithGoogle() {
            const provider = new firebase.auth.GoogleAuthProvider();
            auth.signInWithPopup(provider).then(res => {
                currentUser = res.user;
                updateUI();
            }).catch(err => console.log(err));
        }

        function updateUI() {
            if (currentUser) {
                document.getElementById('user-section').innerHTML = `
                    <div class="profile-info">
                        <img src="${currentUser.photoURL}">
                        <div><b>${currentUser.displayName}</b><br><span style="color:red; cursor:pointer; font-size:11px" onclick="auth.signOut().then(()=>location.reload())">Çıxış</span></div>
                    </div>`;
                document.getElementById('welcome-msg').innerText = `Salam, ${currentUser.displayName.split(' ')[0]}!`;
            }
        }

        function toggleSidebar() {
            document.getElementById('sidebar').classList.toggle('active');
            document.getElementById('overlay').classList.toggle('active');
        }

        function forceCloseSidebar() {
            document.getElementById('sidebar').classList.remove('active');
            document.getElementById('overlay').classList.remove('active');
        }

        function loadHistory() {
            const h = JSON.parse(localStorage.getItem('vace_db') || '{}');
            const list = document.getElementById('history-list');
            list.innerHTML = "";
            Object.keys(h).reverse().forEach(id => {
                const item = document.createElement('div');
                item.className = "history-item";
                item.innerText = h[id][0].content.substring(0, 25) + "...";
                item.onclick = () => { openChat(id); forceCloseSidebar(); };
                list.appendChild(item);
            });
        }

        function openChat(id) {
            currentChatId = id;
            const h = JSON.parse(localStorage.getItem('vace_db') || '{}');
            document.getElementById('start-screen').style.display = "none";
            const win = document.getElementById('chat-window');
            win.style.display = "flex"; win.innerHTML = "";
            h[id].forEach(m => renderMessage(m.content, m.role));
        }

        function renderMessage(text, role) {
            const win = document.getElementById('chat-window');
            const wordCount = text.split(/\s+/).length;
            let displayTxt = text;
            let upgradeBox = "";

            if (role === 'assistant' && wordCount > 40) {
                displayTxt = text.split(/\s+/).slice(0, 40).join(" ") + "...";
                upgradeBox = `<div class="upgrade-card"><p><b>Limit: 40 söz.</b></p><button class="upgrade-btn">Pro-ya keç</button></div>`;
            }

            win.innerHTML += `
                <div class="msg">
                    <div class="avatar ${role === 'user' ? 'u-av' : 'b-av'}">${role === 'user' ? 'Sən' : 'V'}</div>
                    <div class="txt"><b>${role === 'user' ? 'Siz' : 'VaceGPT'}</b><br>${displayTxt}${upgradeBox}</div>
                </div>`;
            win.scrollTop = win.scrollHeight;
        }

        async function handleSend() {
            const inp = document.getElementById('user-in');
            const val = inp.value.trim();
            if (!val) return;

            if (!currentChatId) currentChatId = "chat_" + Date.now();
            document.getElementById('start-screen').style.display = "none";
            document.getElementById('chat-window').style.display = "flex";

            renderMessage(val, 'user');
            inp.value = "";

            const h = JSON.parse(localStorage.getItem('vace_db') || '{}');
            const context = h[currentChatId] || [];

            try {
                const res = await fetch("https://api.groq.com/openai/v1/chat/completions", {
                    method: "POST",
                    headers: { "Authorization": `Bearer ${GROQ_KEY}`, "Content-Type": "application/json" },
                    body: JSON.stringify({
                        model: "llama-3.3-70b-versatile",
                        messages: [{role: "system", content: "Sənin adın VaceGPT-dir. Azərbaycan dilində səmimi köməkçisən."}, ...context, {role: "user", content: val}]
                    })
                });
                const data = await res.json();
                const reply = data.choices[0].message.content;
                renderMessage(reply, 'assistant');
                
                const db = JSON.parse(localStorage.getItem('vace_db') || '{}');
                if (!db[currentChatId]) db[currentChatId] = [];
                db[currentChatId].push({role: 'user', content: val}, {role: 'assistant', content: reply});
                localStorage.setItem('vace_db', JSON.stringify(db));
                loadHistory();
            } catch (e) { renderMessage("Xəta baş verdi.", 'assistant'); }
        }

        function newChat() {
            currentChatId = null;
            document.getElementById('chat-window').innerHTML = "";
            document.getElementById('chat-window').style.display = "none";
            document.getElementById('start-screen').style.display = "flex";
        }

        auth.onAuthStateChanged(user => { if(user) { currentUser = user; updateUI(); } });
        document.getElementById('user-in').onkeypress = (e) => { if(e.key === 'Enter') handleSend(); };
        loadHistory();
    </script>
</body>
</html>
